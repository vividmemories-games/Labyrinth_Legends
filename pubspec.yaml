name: labyrinth_legends
description: Draw your path through ancient labyrinths — a premium puzzle adventure.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/levels/world_1/
    - assets/images/
    - assets/images/icons/
    - assets/images/illustrations/
    - assets/images/backgrounds/
    # Flutter does not recurse — each gameplay category must be listed.
    - assets/images/gameplay/environment/
    - assets/images/gameplay/explorer/
    - assets/images/gameplay/collectibles/
    - assets/images/gameplay/puzzle/
    - assets/images/gameplay/feedback/
    - assets/images/icons/gameplay/
    - assets/images/ui/
